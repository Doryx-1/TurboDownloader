<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TurboDownloader — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; background: #1a1a1a; color: #dddddd;
      padding: 32px; max-width: 520px; margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 600; color: #eee; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 28px; }
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #888; margin-bottom: 12px;
      padding-bottom: 6px; border-bottom: 1px solid #2a2a2a;
    }
    .status-box {
      display: flex; align-items: center; gap: 12px;
      background: #222; border-radius: 8px; padding: 14px 16px;
      margin-bottom: 14px;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.ok  { background: #2e8b57; }
    .status-dot.err { background: #8B0000; }
    .status-dot.checking { background: #888; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { flex: 1; font-size: 13px; }
    .status-text small { display: block; color: #666; font-size: 11px; margin-top: 2px; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
    input[type="text"] {
      width: 100%; background: #2a2a2a; border: 1px solid #333;
      border-radius: 6px; color: #ddd; font-size: 13px; padding: 8px 12px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #1f6aa5; }
    .btn {
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 9px 18px; transition: background 0.2s;
    }
    .btn-primary { background: #1f6aa5; color: #fff; }
    .btn-primary:hover { background: #1a5a8f; }
    .btn-secondary { background: transparent; color: #888; border: 1px solid #333; }
    .btn-secondary:hover { background: #2a2a2a; color: #ddd; }
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    .feedback {
      margin-top: 12px; padding: 10px 14px; border-radius: 6px;
      font-size: 12px; display: none;
    }
    .feedback.success { background:#0d1f0d; color:#7aaa7a; border:1px solid #1a3a1a; display:block; }
    .feedback.error   { background:#1f0d0d; color:#aa7a7a; border:1px solid #3a1a1a; display:block; }
    .ext-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .ext-tag {
      background: #2a2a2a; border: 1px solid #333; border-radius: 4px;
      padding: 3px 10px; font-size: 12px; cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .ext-tag.active { background: #0d1a2a; border-color: #1f6aa5; color: #7ab8e8; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #222;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-desc { font-size: 12px; color: #aaa; margin-top: 2px; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #444;
      border-radius: 20px; cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: ""; position: absolute; width: 14px; height: 14px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #1f6aa5; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h1>⬇ TurboDownloader</h1>
  <p class="subtitle">Extension settings</p>

  <!-- ── Status ── -->
  <div class="section">
    <div class="section-title">Connection</div>
    <div class="status-box">
      <div class="status-dot checking" id="status-dot"></div>
      <div class="status-text">
        <span id="status-text">Checking…</span>
        <small id="status-sub">Connecting to TurboDownloader on this machine</small>
      </div>
    </div>
    <div class="field">
      <label>Default destination (path on server, leave blank for TD default)</label>
      <input type="text" id="dest" placeholder="e.g. D:\Medias\Downloads">
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="test-btn">Test connection</button>
      <button class="btn btn-primary"   id="save-btn">Save</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- ── Interception ── -->
  <div class="section">
    <div class="section-title">Download interception</div>
    <div class="toggle-row">
      <div>
        <div>Auto-intercept downloads</div>
        <div class="toggle-desc">Automatically redirect matching downloads to TurboDownloader</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="intercept">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- ── Extensions ── -->
  <div class="section">
    <div class="section-title">Intercepted file types</div>
    <div class="ext-grid" id="ext-grid"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
